name: 'Build Wilde Chocofi'
on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["nice_nano_v2"]'
      shield: '["corne_left","corne_right","settings_reset"]'
      branches: '["zmkfirmware/zmk/v0.3.0"]'

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Rename firmware files
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p firmware
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            for file in "$dir"*.uf2; do
              [ -f "$file" ] || continue
              if echo "$name" | grep -q "corne_left"; then
                newname="chocofi_left_${DATE}.uf2"
              elif echo "$name" | grep -q "corne_right"; then
                newname="chocofi_right_${DATE}.uf2"
              elif echo "$name" | grep -q "settings_reset"; then
                newname="chocofi_settings_reset_${DATE}.uf2"
              else
                newname="${name}_${DATE}.uf2"
              fi
              mv "$file" "firmware/${newname}"
            done
          done
      - name: Delete old release
        run: gh release delete latest --yes --repo ${{ github.repository }} || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Firmware
          make_latest: true
          files: firmware/*.uf2
